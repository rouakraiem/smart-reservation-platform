syntax = "proto3";

package notification;

service NotificationService {
  rpc CreateNotification(CreateNotificationRequest)  returns (NotificationResponse);
  rpc GetNotifications(GetNotificationsRequest)      returns (ListNotificationsResponse);
  rpc MarkAsRead(MarkAsReadRequest)                  returns (MarkAsReadResponse);
}

// ─── Requests ────────────────────────────────────────────────
message CreateNotificationRequest {
  string user_id = 1;
  string type    = 2;   // "welcome" | "reservation_created" | "reservation_cancelled" | "reservation_updated"
  string message = 3;
}

message GetNotificationsRequest { string user_id = 1; }
message MarkAsReadRequest       { string id      = 1; }

// ─── Response types ──────────────────────────────────────────
message Notification {
  string id         = 1;
  string user_id    = 2;
  string type       = 3;
  string message    = 4;
  bool   is_read    = 5;
  string created_at = 6;
}

message NotificationResponse {
  bool         success      = 1;
  string       message      = 2;
  Notification notification = 3;
}

message ListNotificationsResponse {
  bool                  success       = 1;
  repeated Notification notifications = 2;
}

message MarkAsReadResponse {
  bool   success = 1;
  string message = 2;
}
